<svg width="200" height="150" viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg" class="company-logo">
                        <defs>
                                            <!-- إضاءة خفيفة (Glow) للأزرق -->
                        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                            <feMerge>
                            <feMergeNode in="coloredBlur"/>
                            <feMergeNode in="SourceGraphic"/>
                            </feMerge>
                         </filter>
                        </defs>
    
                                                <!-- اللون الأزرق الداكن الملكي الملكي -->
                        <g fill="#00d2ff" filter="url(#glow)">
                                                <!-- حرف الـ A (القاعدة القوية) -->
                            <path d="M70,20 L30,130 L55,130 L62,110 L100,110 L100,90 L68,90 L75,70 L100,70 L100,50 L82,50 L70,20 Z" />
        
                                                <!-- حرف الـ N (المتداخل مع A) -->
                            <path d="M100,20 L100,130 L125,130 L125,60 L145,130 L170,130 L170,20 L145,20 L145,90 L125,20 L100,20 Z" />
        
                        </g>
                    </svg>